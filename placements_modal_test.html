<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Modal Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <button id="open" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#testModal">Open Modal</button>

  <div class="modal fade" id="testModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Modal OK</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">Modal opened — Bootstrap JS working.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('open').addEventListener('click', function(){
      console.log('Open button clicked');
    });
  </script>
</body>
</html>
